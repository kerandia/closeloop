services:
  db:
    image: postgres:16
    container_name: closeloop-db
    environment:
      POSTGRES_USER: closeloop
      POSTGRES_PASSWORD: closeloop
      POSTGRES_DB: closeloop
    ports:
      - "5432:5432"
    volumes:
      - closeloop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U closeloop"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  closeloop_pgdata:
